<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGit - Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1b2a 50%, #1a2a3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
        }

        .circle-bg-1 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74,144,226,0.2), transparent);
            top: -100px;
            left: -100px;
            animation: float 20s ease-in-out infinite;
        }

        .circle-bg-2 {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74,144,226,0.15), transparent);
            bottom: -50px;
            right: -50px;
            animation: float 15s ease-in-out infinite reverse;
        }

        .login-container {
            width: 520px;
            height: 520px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #4a90e2, #1e3a8a, #0f2b5c);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            padding: 60px 50px;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-size: 52px;
            font-weight: 800;
            color: white;
            margin-bottom: 12px;
        }

        .title {
            font-size: 28px;
            font-weight: 500;
            color: white;
            margin-bottom: 35px;
        }

        .error-msg {
            color: #ff6b6b;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .success-msg {
            color: #6bff6b;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .input-group {
            width: 100%;
            margin-bottom: 22px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            font-size: 15px;
            border: none;
            border-radius: 12px;
            outline: none;
            background-color: rgba(255,255,255,0.12);
            color: white;
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: white;
            color: #1e3a8a;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .link {
            margin-top: 28px;
        }

        .link a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }

        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="circle-bg-1"></div>
    <div class="circle-bg-2"></div>

    <div id="loginView" class="login-container">
        <div class="logo">ProGit</div>
        <div class="title">Sign in</div>
        <div id="loginError" class="error-msg" style="display: none;"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Email address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Sign in</button>
        </form>
        
        <div class="link">
            <a href="#" onclick="showSignup()">Create Account</a>
        </div>
    </div>

    <div id="signupView" class="login-container" style="display: none;">
        <div class="logo">ProGit</div>
        <div class="title">Create Account</div>
        <div id="signupError" class="error-msg" style="display: none;"></div>
        <div id="signupSuccess" class="success-msg" style="display: none;"></div>
        
        <form id="signupForm">
            <div class="input-group">
                <label>Email address</label>
                <input type="email" id="signupEmail" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password (min 6 characters)" required>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        
        <div class="link">
            <a href="#" onclick="showLogin()">Back to Sign In</a>
        </div>
    </div>

    <script>
        function showSignup() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('signupView').style.display = 'flex';
        }

        function showLogin() {
            document.getElementById('signupView').style.display = 'none';
            document.getElementById('loginView').style.display = 'flex';
            document.getElementById('signupError').style.display = 'none';
            document.getElementById('signupSuccess').style.display = 'none';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                const userData = { email: user.email };
                localStorage.setItem('currentUser', JSON.stringify(userData));
                window.location.href = 'dashboard.html';
            } else {
                const errorDiv = document.getElementById('loginError');
                errorDiv.textContent = 'Invalid credentials. Please create an account first.';
                errorDiv.style.display = 'block';
            }
        });

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            document.getElementById('signupError').style.display = 'none';
            document.getElementById('signupSuccess').style.display = 'none';
            
            if (password !== confirmPassword) {
                const errorDiv = document.getElementById('signupError');
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                const errorDiv = document.getElementById('signupError');
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userExists = users.find(u => u.email === email);
            
            if (userExists) {
                const errorDiv = document.getElementById('signupError');
                errorDiv.textContent = 'User already exists. Please sign in.';
                errorDiv.style.display = 'block';
                return;
            }
            
            users.push({ email, password });
            localStorage.setItem('users', JSON.stringify(users));
            
            const successDiv = document.getElementById('signupSuccess');
            successDiv.textContent = 'Account created successfully! Redirecting to login...';
            successDiv.style.display = 'block';
            
            setTimeout(() => {
                showLogin();
                document.getElementById('loginEmail').value = email;
                document.getElementById('loginPassword').value = '';
            }, 2000);
        });

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (currentUser) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
